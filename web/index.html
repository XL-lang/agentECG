<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECG-QA 浏览页</title>
    <style>
      :root {
        --bg: #f4efe8;
        --panel: #fffaf4;
        --panel-strong: #f7efe4;
        --ink: #1f2933;
        --muted: #5b6974;
        --accent: #0f4c81;
        --accent-2: #d97a2b;
        --border: #d9c8b4;
        --ok: #1d7a46;
        --bad: #a2342b;
        --shadow: 0 18px 40px rgba(33, 33, 33, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(217, 122, 43, 0.15), transparent 28%),
          radial-gradient(circle at bottom right, rgba(15, 76, 129, 0.18), transparent 30%),
          var(--bg);
      }

      .shell {
        max-width: 1440px;
        margin: 0 auto;
        padding: 24px;
      }

      .hero {
        background: linear-gradient(135deg, rgba(255, 250, 244, 0.95), rgba(247, 239, 228, 0.95));
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 24px;
        box-shadow: var(--shadow);
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 40px);
        letter-spacing: 0.02em;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
      }

      .tabs {
        display: inline-flex;
        gap: 10px;
        margin-top: 22px;
        flex-wrap: wrap;
      }

      .tab-button {
        min-height: 42px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.65);
        color: var(--muted);
        padding: 0 18px;
        font-size: 14px;
        font-weight: 700;
      }

      .tab-button.active {
        background: linear-gradient(135deg, var(--accent), #26649a);
        color: white;
        border-color: transparent;
      }

      .page-section {
        display: none;
      }

      .page-section.active {
        display: block;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 12px;
        margin-top: 20px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .field label {
        font-size: 13px;
        color: var(--muted);
      }

      select,
      input,
      textarea,
      button {
        min-height: 48px;
        border-radius: 14px;
        border: 1px solid var(--border);
        font-size: 15px;
      }

      select {
        background: var(--panel);
        padding: 0 14px;
        color: var(--ink);
      }

      input,
      textarea {
        background: var(--panel);
        padding: 12px 14px;
        color: var(--ink);
        font: inherit;
      }

      textarea {
        min-height: 140px;
        resize: vertical;
      }

      button {
        background: linear-gradient(135deg, var(--accent), #26649a);
        color: white;
        font-weight: 700;
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(15, 76, 129, 0.18);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .status {
        margin-top: 16px;
        min-height: 24px;
        color: var(--muted);
      }

      .status.error {
        color: var(--bad);
      }

      .grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 20px;
        margin-top: 20px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 20px;
        box-shadow: var(--shadow);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }

      .pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--panel-strong);
        font-size: 13px;
        color: var(--muted);
      }

      .question {
        font-size: 22px;
        line-height: 1.45;
        margin: 0 0 16px;
      }

      .answer-grid {
        display: grid;
        gap: 12px;
      }

      .answer-box {
        background: white;
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 14px 16px;
      }

      .answer-box h3,
      .evidence h3,
      .images h3 {
        margin: 0 0 8px;
        font-size: 15px;
        color: var(--muted);
      }

      .answer-value {
        font-size: 22px;
        font-weight: 700;
      }

      .ok {
        color: var(--ok);
      }

      .bad {
        color: var(--bad);
      }

      .evidence-summary {
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 12px;
      }

      .evidence ul {
        padding-left: 18px;
        margin: 0;
      }

      .evidence li {
        margin: 8px 0;
        line-height: 1.5;
      }

      .images-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(440px, 1fr));
        gap: 16px;
      }

      figure {
        margin: 0;
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 12px;
        background: white;
      }

      figure img {
        width: 100%;
        display: block;
        border-radius: 12px;
        max-height: 520px;
        object-fit: contain;
        background: linear-gradient(180deg, #fdf9f4, #f6efe4);
      }

      figure figcaption {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .upload-grid {
        display: grid;
        grid-template-columns: 0.95fr 1.05fr;
        gap: 20px;
        margin-top: 20px;
      }

      .upload-result-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }

      .upload-hint {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      @media (max-width: 1024px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .upload-grid {
          grid-template-columns: 1fr;
        }

        .images-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <h1>ECG-QA 单页浏览</h1>
        <p>支持浏览已发布离线 snapshot，也支持上传结构化 ECG 信号并直接走现有推理链路。</p>
        <div class="tabs">
          <button id="browseTab" class="tab-button active" type="button">离线浏览</button>
          <button id="uploadTab" class="tab-button" type="button">自主上传</button>
        </div>
      </section>

      <section id="browseSection" class="page-section active">
        <div class="controls">
          <div class="field">
            <label for="questionType">题型</label>
            <select id="questionType">
              <option value="">全部</option>
            </select>
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button id="nextButton" type="button">下一题</button>
          </div>
        </div>
        <div id="status" class="status">正在加载题目...</div>

        <div class="grid">
          <section class="card">
            <div id="meta" class="meta"></div>
            <h2 id="question" class="question">-</h2>
          </section>

          <section class="card">
            <div class="answer-grid">
              <div class="answer-box">
                <h3>Agent 预测答案</h3>
                <div id="predictedAnswer" class="answer-value">-</div>
              </div>
              <div class="answer-box">
                <h3>数据集标准答案</h3>
                <div id="goldAnswers" class="answer-value">-</div>
              </div>
              <div class="answer-box">
                <h3>一致性</h3>
                <div id="correctness" class="answer-value">-</div>
              </div>
              <div class="answer-box evidence">
                <h3>依据摘要</h3>
                <div id="evidenceSummary" class="evidence-summary">-</div>
                <ul id="evidenceBullets"></ul>
              </div>
            </div>
          </section>
        </div>

        <section class="card images" style="margin-top: 20px">
          <h3>ECG 图像</h3>
          <div id="images" class="images-grid"></div>
        </section>
      </section>

      <section id="uploadSection" class="page-section">
        <div class="upload-grid">
          <section class="card">
            <h2 class="question">上传 ECG 并提问</h2>
            <p class="upload-hint">当前仅支持 CSV 结构化 ECG 信号。上传后会真实调用现有后端推理链路，不额外修改 prompt；因此可能成功，也可能直接返回推理错误。</p>
            <div class="field">
              <label for="uploadQuestion">问题</label>
              <textarea id="uploadQuestion" placeholder="例如：请解释这份心电图中最主要的异常表现。"></textarea>
            </div>
            <div class="controls">
              <div class="field">
                <label for="uploadFs">采样率 (Hz)</label>
                <input id="uploadFs" type="number" min="1" value="500" />
              </div>
              <div class="field">
                <label for="uploadFile">ECG CSV 文件</label>
                <input id="uploadFile" type="file" accept=".csv,text/csv" />
              </div>
              <div class="field">
                <label>&nbsp;</label>
                <button id="uploadButton" type="button">上传并推理</button>
              </div>
            </div>
            <div id="uploadStatus" class="status">等待上传。</div>
          </section>

          <section class="card">
            <div id="uploadMeta" class="upload-result-meta"></div>
            <div class="answer-grid">
              <div class="answer-box">
                <h3>问题</h3>
                <div id="uploadQuestionText" class="evidence-summary">-</div>
              </div>
              <div class="answer-box">
                <h3>预测答案</h3>
                <div id="uploadPredictedAnswer" class="answer-value">-</div>
              </div>
              <div class="answer-box evidence">
                <h3>依据摘要</h3>
                <div id="uploadEvidenceSummary" class="evidence-summary">-</div>
                <ul id="uploadEvidenceBullets"></ul>
              </div>
            </div>
          </section>
        </div>

        <section class="card images" style="margin-top: 20px">
          <h3>上传 ECG 预览</h3>
          <div id="uploadImages" class="images-grid"></div>
        </section>
      </section>
    </div>

    <script>
      const browseTabEl = document.getElementById("browseTab");
      const uploadTabEl = document.getElementById("uploadTab");
      const browseSectionEl = document.getElementById("browseSection");
      const uploadSectionEl = document.getElementById("uploadSection");

      const questionTypeEl = document.getElementById("questionType");
      const nextButtonEl = document.getElementById("nextButton");
      const statusEl = document.getElementById("status");

      const metaEl = document.getElementById("meta");
      const questionEl = document.getElementById("question");
      const predictedAnswerEl = document.getElementById("predictedAnswer");
      const goldAnswersEl = document.getElementById("goldAnswers");
      const correctnessEl = document.getElementById("correctness");
      const evidenceSummaryEl = document.getElementById("evidenceSummary");
      const evidenceBulletsEl = document.getElementById("evidenceBullets");
      const imagesEl = document.getElementById("images");

      const uploadQuestionEl = document.getElementById("uploadQuestion");
      const uploadFsEl = document.getElementById("uploadFs");
      const uploadFileEl = document.getElementById("uploadFile");
      const uploadButtonEl = document.getElementById("uploadButton");
      const uploadStatusEl = document.getElementById("uploadStatus");
      const uploadMetaEl = document.getElementById("uploadMeta");
      const uploadQuestionTextEl = document.getElementById("uploadQuestionText");
      const uploadPredictedAnswerEl = document.getElementById("uploadPredictedAnswer");
      const uploadEvidenceSummaryEl = document.getElementById("uploadEvidenceSummary");
      const uploadEvidenceBulletsEl = document.getElementById("uploadEvidenceBullets");
      const uploadImagesEl = document.getElementById("uploadImages");

      function setActiveTab(tabName) {
        const browseActive = tabName === "browse";
        browseTabEl.classList.toggle("active", browseActive);
        uploadTabEl.classList.toggle("active", !browseActive);
        browseSectionEl.classList.toggle("active", browseActive);
        uploadSectionEl.classList.toggle("active", !browseActive);
      }

      function appendPill(container, text) {
        const pill = document.createElement("span");
        pill.className = "pill";
        pill.textContent = text;
        container.appendChild(pill);
      }

      function renderImages(container, images) {
        container.innerHTML = "";
        (images || []).forEach((image) => {
          const figure = document.createElement("figure");
          const img = document.createElement("img");
          img.src = image.image_url;
          img.alt = image.title;
          const caption = document.createElement("figcaption");
          caption.textContent = image.title;
          figure.appendChild(img);
          figure.appendChild(caption);
          container.appendChild(figure);
        });
      }

      async function loadOptions() {
        const response = await fetch("/api/options");
        if (!response.ok) {
          throw new Error(`加载选项失败: ${response.status}`);
        }
        const data = await response.json();
        statusEl.textContent = `当前 snapshot: ${data.version || "-"} | 发布时间: ${data.created_at || "-"} | 样本数: ${data.sample_count || 0}`;
        const fragment = document.createDocumentFragment();
        (data.question_types || []).forEach((questionType) => {
          const option = document.createElement("option");
          option.value = questionType.name;
          option.textContent = `${questionType.name} (${questionType.count})`;
          fragment.appendChild(option);
        });
        questionTypeEl.appendChild(fragment);
      }

      function renderPayload(payload) {
        metaEl.innerHTML = "";
        appendPill(metaEl, `题型: ${payload.question_type}`);
        appendPill(metaEl, `snapshot: ${payload.snapshot_version || "-"}`);

        questionEl.textContent = payload.question || "-";

        predictedAnswerEl.textContent = payload.predicted_answer || "-";
        goldAnswersEl.textContent = (payload.gold_answers || []).join(" / ") || "-";
        correctnessEl.textContent = payload.is_correct ? "一致" : "不一致";
        correctnessEl.className = `answer-value ${payload.is_correct ? "ok" : "bad"}`;

        evidenceSummaryEl.textContent = payload.evidence?.summary || "-";
        evidenceBulletsEl.innerHTML = "";
        (payload.evidence?.bullets || []).forEach((bullet) => {
          const li = document.createElement("li");
          li.textContent = bullet;
          evidenceBulletsEl.appendChild(li);
        });
        renderImages(imagesEl, payload.ecg_images || []);
      }

      function renderUploadPayload(payload) {
        uploadMetaEl.innerHTML = "";
        appendPill(uploadMetaEl, `文件: ${payload.upload?.filename || "-"}`);
        appendPill(uploadMetaEl, `fs: ${payload.upload?.fs || "-"} Hz`);
        appendPill(uploadMetaEl, `导联数: ${payload.upload?.n_leads || "-"}`);
        appendPill(uploadMetaEl, `采样点: ${payload.upload?.n_samples || "-"}`);

        uploadQuestionTextEl.textContent = payload.question || "-";
        uploadPredictedAnswerEl.textContent = payload.predicted_answer || "未返回";
        uploadEvidenceSummaryEl.textContent = payload.evidence?.summary || "-";
        uploadEvidenceBulletsEl.innerHTML = "";
        (payload.evidence?.bullets || []).forEach((bullet) => {
          const li = document.createElement("li");
          li.textContent = bullet;
          uploadEvidenceBulletsEl.appendChild(li);
        });
        renderImages(uploadImagesEl, payload.ecg_images || []);
      }

      async function loadNextSample() {
        nextButtonEl.disabled = true;
        statusEl.className = "status";
        statusEl.textContent = "正在从已发布 snapshot 中读取样本...";
        try {
          const response = await fetch("/api/sample/next", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              question_type: questionTypeEl.value || null,
            }),
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.detail || `请求失败: ${response.status}`);
          }
          renderPayload(data);
          statusEl.textContent = `样本已更新。当前 snapshot: ${data.snapshot_version || "-"}`;
        } catch (error) {
          statusEl.className = "status error";
          statusEl.textContent = error.message || "加载失败";
        } finally {
          nextButtonEl.disabled = false;
        }
      }

      async function submitUpload() {
        const file = uploadFileEl.files?.[0];
        const question = (uploadQuestionEl.value || "").trim();
        const fs = Number.parseInt(uploadFsEl.value || "500", 10);

        if (!question) {
          uploadStatusEl.className = "status error";
          uploadStatusEl.textContent = "请先输入问题。";
          return;
        }
        if (!file) {
          uploadStatusEl.className = "status error";
          uploadStatusEl.textContent = "请先选择 CSV 文件。";
          return;
        }

        uploadButtonEl.disabled = true;
        uploadStatusEl.className = "status";
        uploadStatusEl.textContent = "正在上传并调用真实推理链路...";

        try {
          const formData = new FormData();
          formData.append("question", question);
          formData.append("fs", String(fs > 0 ? fs : 500));
          formData.append("ecg_file", file);

          const response = await fetch("/api/upload/analyze", {
            method: "POST",
            body: formData,
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.detail || `上传失败: ${response.status}`);
          }
          renderUploadPayload(data);
          uploadStatusEl.textContent = "推理已完成。当前结果来自真实后端链路。";
        } catch (error) {
          uploadStatusEl.className = "status error";
          uploadStatusEl.textContent = error.message || "上传推理失败";
        } finally {
          uploadButtonEl.disabled = false;
        }
      }

      browseTabEl.addEventListener("click", () => setActiveTab("browse"));
      uploadTabEl.addEventListener("click", () => setActiveTab("upload"));
      nextButtonEl.addEventListener("click", loadNextSample);
      uploadButtonEl.addEventListener("click", submitUpload);

      (async function bootstrap() {
        try {
          await loadOptions();
          await loadNextSample();
        } catch (error) {
          statusEl.className = "status error";
          statusEl.textContent = error.message || "初始化失败";
        }
      })();
    </script>
  </body>
</html>
